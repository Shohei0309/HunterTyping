<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>生き物ハンタータイピング Ver.2.0.1</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;background:#e9fbff;color:#213}
button,input{font:inherit}
.screen{display:none;min-height:100dvh}
.active{display:block}
#cover{place-items:center;padding:10px;background:linear-gradient(180deg,#8ee7ff,#eafff2)}
#cover.active{display:grid}
.coverCard{position:relative;width:min(100vw,calc((100dvh - 20px)*4/3));aspect-ratio:4/3;max-height:calc(100dvh - 20px);border-radius:28px;overflow:hidden;box-shadow:0 20px 50px #0003;background:#dff7ff}
.coverCard img{width:100%;height:100%;object-fit:contain}
.startHotspot{position:absolute;left:35%;right:18%;bottom:4%;height:18%;border:0;background:transparent;cursor:pointer}
.app{min-height:100dvh;background:linear-gradient(180deg,#d7f7ff,#f6fff2);padding:12px}
.top{display:flex;gap:10px;align-items:center;justify-content:space-between;max-width:1120px;margin:0 auto 10px}
.tabs{display:flex;gap:8px;flex-wrap:wrap}
.tab{padding:12px 18px;border:3px solid #22577a;border-radius:18px;background:#fff;font-weight:900;color:#22577a}
.tab.on{background:#22577a;color:white}
.rankbox{font-weight:900;background:#fff;padding:10px 14px;border-radius:18px;border:3px solid #57cc99}
.panel{max-width:1120px;margin:auto;background:#ffffffdd;border:4px solid #90e0ef;border-radius:28px;padding:18px;box-shadow:0 8px 25px #0001}
h1,h2{margin:.2em 0 .5em}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.levelCard{position:relative;border-radius:28px;padding:20px;min-height:260px;background:linear-gradient(180deg,#fff,#f7fbff);border:4px solid #ddd;box-shadow:0 10px 22px #0002;text-align:center}
.levelCard h2{font-size:28px}
.badge{height:62px;display:grid;place-items:center;font-size:54px}
.badgeImg{max-height:64px;max-width:84px;object-fit:contain;filter:drop-shadow(0 5px 6px #0002)}
.locked{filter:grayscale(1);opacity:.62}
.challenge{margin-top:14px;padding:12px 20px;border:0;border-radius:999px;background:#06d6a0;color:#063;font-weight:900;box-shadow:0 5px 0 #04966f}
.challenge:disabled{background:#ccc;color:#666;box-shadow:none}
.gameHead{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.qbox{text-align:center;padding:22px;background:#fff;border-radius:28px;border:4px solid #ffd166;margin:15px 0}
.qImage{width:min(330px,78vw);height:210px;object-fit:contain;filter:drop-shadow(0 8px 10px #0002)}
.qname{font-size:clamp(34px,7vw,68px);font-weight:900}
.romaji{font-size:clamp(22px,4vw,36px);color:#118ab2;font-weight:900;letter-spacing:2px;min-height:45px}
#answer{width:min(92vw,650px);font-size:32px;padding:14px 18px;border:4px solid #22577a;border-radius:20px;text-align:center}
.result{font-size:28px;font-weight:900;min-height:40px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
.bioCard{background:linear-gradient(180deg,#fff,#f3fff8);border:3px solid #57cc99;border-radius:20px;padding:10px;text-align:center;min-height:235px;box-shadow:0 6px 14px #0001;position:relative;cursor:pointer}
.bioCard.locked2{background:#eee;border-color:#ccc;color:#999}
.cardImgBox{height:130px;display:grid;place-items:center;margin:4px 0}
.cardImg{max-width:100%;max-height:126px;object-fit:contain;filter:drop-shadow(0 5px 6px #0002)}
.skull{position:absolute;left:12px;top:10px;font-size:30px}
.medal{position:absolute;right:12px;top:10px;font-size:30px}
.filterBar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.filterBar button{border:2px solid #22577a;background:white;border-radius:999px;padding:8px 12px;font-weight:900}
.filterBar .on{background:#22577a;color:white}
.modal{position:fixed;inset:0;background:#0007;display:none;place-items:center;padding:20px;z-index:5}
.modal.show{display:grid}
.modalCard{background:#fff;border-radius:28px;padding:22px;max-width:620px;width:100%;border:5px solid #ffd166;text-align:center;max-height:90dvh;overflow:auto}
.modalImg{width:min(340px,80vw);height:220px;object-fit:contain;filter:drop-shadow(0 8px 10px #0002)}
.close{float:right;border:0;background:#ef476f;color:white;border-radius:999px;padding:8px 12px;font-weight:900}
.small{font-size:14px;color:#567}
.danger{color:#d90429;font-weight:900}
.progress{height:16px;background:#d7f7ff;border-radius:999px;overflow:hidden;border:2px solid #90e0ef}
.progress>div{height:100%;width:0;background:#57cc99}
ruby rt{font-size:.55em;color:#567;font-weight:700}
.secretHintBox{margin-top:12px;font-size:22px;font-weight:900;line-height:1.6;color:#213;text-align:left;display:inline-block}
.secretRomaHint{font-size:32px;color:#118ab2;font-weight:900;letter-spacing:5px;margin-top:8px}
.secretGameOver{font-size:34px;font-weight:900;color:#ef476f;margin-top:18px;line-height:1.5}
.secretComplete{font-size:38px;font-weight:900;color:#b8860b;text-shadow:0 0 10px #facc15;margin-top:15px;line-height:1.55}
@keyframes specialGlow{0%{box-shadow:0 0 8px #b967ff55,0 0 0 3px #b967ff;border-color:#a855f7}50%{box-shadow:0 0 22px #f0abfcaa,0 0 0 3px #f0abfc;border-color:#e879f9}100%{box-shadow:0 0 8px #b967ff55,0 0 0 3px #b967ff;border-color:#a855f7}}
@keyframes secretGlow{0%{box-shadow:0 0 10px #facc1555,0 0 0 3px #111;border-color:#111}50%{box-shadow:0 0 28px #facc15dd,0 0 0 3px #facc15;border-color:#facc15}100%{box-shadow:0 0 10px #facc1555,0 0 0 3px #111;border-color:#111}}
@keyframes sparkleMove{0%{background-position:0 0,20px 30px,0 0}100%{background-position:70px -100px,-40px -80px,0 0}}
.bioCard.specialCard,.modalCard.specialModal{border-color:#a855f7;background:radial-gradient(circle at 20% 20%,#ffffff 0 2px,transparent 3px),radial-gradient(circle at 75% 35%,#ffffff 0 1.8px,transparent 3px),linear-gradient(180deg,#fff,#fbf5ff);background-size:80px 80px,110px 110px,100% 100%;animation:specialGlow 2.6s ease-in-out infinite,sparkleMove 7s linear infinite}
.bioCard.secretCard,.modalCard.secretModal{border-color:#111;background:radial-gradient(circle at 20% 25%,#fff7 0 2px,transparent 3px),radial-gradient(circle at 80% 40%,#fff9 0 2px,transparent 3px),linear-gradient(180deg,#fff8db,#fff,#fff3b0);background-size:80px 80px,120px 120px,100% 100%;animation:secretGlow 2.1s ease-in-out infinite,sparkleMove 6s linear infinite}
.bioCard.secretCard h2,.bioCard.secretCard .medal,.bioCard.secretCard .small,.modalCard.secretModal h1,.modalCard.secretModal p{color:#7c5200;text-shadow:0 0 6px #facc1588}

@keyframes startGuidePulse{
  0%,100%{opacity:.45;transform:translateX(-50%) scale(1)}
  50%{opacity:1;transform:translateX(-50%) scale(1.03)}
}
.startGuide{
  position:absolute;
  left:50%;
  bottom:2.2%;
  transform:translateX(-50%);
  width:max-content;
  max-width:90%;
  padding:.35em .8em;
  border-radius:999px;
  background:#0008;
  color:#fff;
  font-size:clamp(16px,2.2vw,28px);
  font-weight:900;
  letter-spacing:.03em;
  text-align:center;
  text-shadow:-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,2px 2px 0 #000;
  pointer-events:none;
  animation:startGuidePulse 2s ease-in-out infinite;
}

@media(max-width:900px){.cards{grid-template-columns:1fr 1fr}.top{align-items:stretch;flex-direction:column}}
@media(max-width:520px){.cards{grid-template-columns:1fr}.tabs{display:grid;grid-template-columns:1fr 1fr}.tab{padding:10px 8px}}
</style>
</head>
<body>
<section id="cover" class="screen active"><div class="coverCard" onclick="showApp()" role="button" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' '){showApp()}"><img src="assets/images/cover.png" alt="生き物ハンター表紙"><div class="startGuide">画面をクリック（タップ）するとスタートします</div></div></section>
<main id="app" class="screen app">
  <div class="top"><div class="tabs"><button class="tab on" id="tabHome" onclick="showTab('home')">タイピング<ruby>練習<rt>れんしゅう</rt></ruby></button><button class="tab" id="tabBook" onclick="showTab('book')"><ruby>集<rt>あつ</rt></ruby>めた<ruby>生<rt>い</rt></ruby>き<ruby>物<rt>もの</rt></ruby>リスト</button><button class="tab" onclick="resetData()"><ruby>記録<rt>きろく</rt></ruby>リセット</button></div><div class="rankbox" id="rankBox"><ruby>生<rt>い</rt></ruby>き<ruby>物<rt>もの</rt></ruby><ruby>博士<rt>はかせ</rt></ruby>への<ruby>道<rt>みち</rt></ruby></div></div>
  <section id="home" class="panel"><h1><ruby>生<rt>い</rt></ruby>き<ruby>物<rt>もの</rt></ruby>ハンタータイピング Ver.2.0.1</h1><p>1ゲームは1<ruby>分間<rt>ぷんかん</rt></ruby>。Enterで<ruby>答<rt>こた</rt></ruby>えを<ruby>確定<rt>かくてい</rt></ruby>しよう。まちがえたら<ruby>入力欄<rt>にゅうりょくらん</rt></ruby>が<ruby>空<rt>から</rt></ruby>になるよ。</p><div class="cards" id="levelCards"></div></section>
  <section id="game" class="panel" style="display:none"><div class="gameHead"><button class="tab" onclick="endGame()">← やめる</button><h2 id="gameTitle">初級研究員</h2><div class="rankbox" id="gameStatus"><ruby>残<rt>のこ</rt></ruby>り <span id="timeLeft">60</span> <ruby>秒<rt>びょう</rt></ruby>　<ruby>得点<rt>とくてん</rt></ruby> <span id="score">0</span></div></div><div class="qbox"><img id="qImage" class="qImage" alt="問題画像"><div class="qname" id="qName"></div><div class="romaji" id="romaji"></div><input id="answer" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="latin" placeholder="ローマ字で入力して Enter"><div class="result" id="result"></div></div></section>
  <section id="book" class="panel" style="display:none"><h1><ruby>集<rt>あつ</rt></ruby>めた<ruby>生<rt>い</rt></ruby>き<ruby>物<rt>もの</rt></ruby>リスト</h1><div class="progress"><div id="progressBar"></div></div><p id="progressText" class="small"></p><div class="filterBar" id="filters"></div><div class="grid" id="bookGrid"></div></section>
</main>
<div class="modal" id="modal"><div class="modalCard"><button class="close" onclick="closeModal()">とじる</button><div id="modalContent"></div></div></div>

function secretComplete(){const s=ANIMALS.find(a=>a.level==='SECRET');if(s){state.found[s.id]={secret:true};state.cleared.secret=true;}save();document.getElementById('qImage').src=IMG(s?s.id:'gokiburi');document.getElementById('qName').innerHTML=rubyText('ゴキブリ');document.getElementById('romaji').innerHTML='';document.getElementById('result').innerHTML='<div class="secretComplete">🎉 SECRET COMPLETE!!<br>ゴキブリを<ruby>発見<rt>はっけん</rt></ruby>！<br><ruby>全<rt>ぜん</rt></ruby>55<ruby>種類<rt>しゅるい</rt></ruby>コンプリート！！<br>あなたは<br><ruby>伝説<rt>でんせつ</rt></ruby>の<ruby>生<rt>い</rt></ruby>き<ruby>物<rt>もの</rt></ruby><ruby>博士<rt>はかせ</rt></ruby>！</div>';setTimeout(()=>{currentLevel=null;renderAll();showTab('book');},4200);}
function endGame(finished=false){clearInterval(timer);if(currentLevel){state.best[currentLevel.id]=Math.max(state.best[currentLevel.id]||0,score);if(finished&&score>=10)state.cleared[currentLevel.id]=true;save();alert(`${currentLevel.name} 終了！ 得点：${score}点${score>=10?'\nクリア！次のレベルが解放されます。':''}`);}currentLevel=null;renderAll();showTab('home');}
function renderBook(){const cats=['すべて',...Array.from(new Set(ANIMALS.map(a=>a.cat)))];const f=document.getElementById('filters');f.innerHTML='';cats.forEach(c=>{const b=document.createElement('button');b.innerHTML=rubyText(c);b.className=filter===c?'on':'';b.onclick=()=>{filter=c;renderBook()};f.appendChild(b);});const data=filter==='すべて'?ANIMALS:ANIMALS.filter(a=>a.cat===filter);const grid=document.getElementById('bookGrid');grid.innerHTML='';data.forEach(a=>{const found=isFound(a.id);const card=document.createElement('div');card.className='bioCard'+(found?'':' locked2')+(found&&a.level==='特級'?' specialCard':'')+(found&&a.level==='SECRET'?' secretCard':'');card.innerHTML=`${a.poison?'<div class="skull">☠️</div>':''}<div class="medal">${found?rankMarks(a.id):'🔒'}</div><div class="cardImgBox"><img class="cardImg" src="${found?IMG(a.id):IMG('unknown')}" alt="${found?a.name:'未発見'}"></div><h2>${found?rubyText(a.name):'？？？'}</h2><p class="small">${found?rubyText(a.cat):rubyText('発見すると画像が開放されるよ')}</p><p class="small">${found?rubyText('取得')+'：'+rubyText(rankText(a.id)):''}</p>`;card.onclick=()=>found&&openModal(a);grid.appendChild(card);});const n=foundCount();document.getElementById('progressText').innerHTML=`${rubyText('発見')} ${n}/${ANIMALS.length}`;document.getElementById('progressBar').style.width=`${ANIMALS.length?n/ANIMALS.length*100:0}%`;}
function openModal(a){const modalCard=document.querySelector('#modal .modalCard');modalCard.classList.remove('specialModal','secretModal');if(a.level==='特級')modalCard.classList.add('specialModal');if(a.level==='SECRET')modalCard.classList.add('secretModal');document.getElementById('modalContent').innerHTML=`<img class="modalImg" src="${IMG(a.id)}" alt="${a.name}"><h1>${rubyText(a.name)}</h1><p style="font-size:28px;font-weight:900">${rubyText('取得ランク')}：${rubyText(rankText(a.id))}</p><p><b>${rubyText('分類')}：</b>${rubyText(a.cat)}</p><p><b>エサ：</b>${rubyText(a.food)}</p><p><b>${rubyText('すんでいる環境')}：</b>${rubyText(a.env)}</p>${a.poison?'<p class="danger">☠️ '+rubyText('毒や針などに注意')+'</p>':''}`;document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show');document.querySelector('#modal .modalCard').classList.remove('specialModal','secretModal')}
function shuffle(arr){return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1])}
const kanaMap={'あ':'a','い':'i','う':'u','え':'e','お':'o','か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko','さ':'sa','し':'shi','す':'su','せ':'se','そ':'so','た':'ta','ち':'chi','つ':'tsu','て':'te','と':'to','な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no','は':'ha','ひ':'hi','ふ':'fu','へ':'he','ほ':'ho','ま':'ma','み':'mi','む':'mu','め':'me','も':'mo','や':'ya','ゆ':'yu','よ':'yo','ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro','わ':'wa','を':'wo','ん':'n','が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go','ざ':'za','じ':'ji','ず':'zu','ぜ':'ze','ぞ':'zo','だ':'da','ぢ':'ji','づ':'zu','で':'de','ど':'do','ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo','ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po'};
const combo={'きゃ':'kya','きゅ':'kyu','きょ':'kyo','しゃ':'sha','しゅ':'shu','しょ':'sho','ちゃ':'cha','ちゅ':'chu','ちょ':'cho','にゃ':'nya','にゅ':'nyu','にょ':'nyo','ひゃ':'hya','ひゅ':'hyu','ひょ':'hyo','みゃ':'mya','みゅ':'myu','みょ':'myo','りゃ':'rya','りゅ':'ryu','りょ':'ryo','ぎゃ':'gya','ぎゅ':'gyu','ぎょ':'gyo','じゃ':'ja','じゅ':'ju','じょ':'jo','びゃ':'bya','びゅ':'byu','びょ':'byo','ぴゃ':'pya','ぴゅ':'pyu','ぴょ':'pyo'};
function toRomaji(str){let out='';for(let i=0;i<str.length;i++){let ch=str[i];if(ch==='っ'){let next=combo[str.slice(i+1,i+3)]||kanaMap[str[i+1]]||'';out+=next[0]||'';continue;}let two=str.slice(i,i+2);if(combo[two]){out+=combo[two];i++;continue;}if(ch==='ー'){let m=out.match(/[aeiou](?!.*[aeiou])/);out+=m?m[0]:'';continue;}out+=kanaMap[ch]||ch.toLowerCase();}return out;}
function romajiOptions(name){const base=toRomaji(name).toLowerCase();const set=new Set([base]);const repl=(a,b)=>{Array.from(set).forEach(v=>{if(v.includes(a))set.add(v.split(a).join(b))})};for(let i=0;i<3;i++){[['shi','si'],['chi','ti'],['tsu','tu'],['fu','hu'],['ji','zi'],['ja','zya'],['ju','zyu'],['jo','zyo'],['sha','sya'],['shu','syu'],['sho','syo'],['cha','tya'],['chu','tyu'],['cho','tyo'],['cha','cya'],['chu','cyu'],['cho','cyo']].forEach(([a,b])=>{repl(a,b);repl(b,a);});}Array.from(set).forEach(v=>{const chars=[...v];for(let i=0;i<chars.length;i++){if(chars[i]==='n'&&chars[i+1]!=='n'){let arr=[...chars];arr.splice(i+1,0,'n');set.add(arr.join(''));}}});Array.from(set).forEach(v=>{if(v.includes('ou')){set.add(v.replaceAll('ou','o'));set.add(v.replaceAll('ou','oo'));}});return Array.from(set);}
renderAll();
