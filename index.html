<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>生き物ハンタータイピング Ver0.6</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;background:#e9fbff;color:#213}button,input{font:inherit}.screen{display:none;min-height:100dvh}.active{display:block}#cover{place-items:center;padding:10px;background:linear-gradient(180deg,#8ee7ff,#eafff2)}#cover.active{display:grid}.coverCard{position:relative;width:min(100vw,calc((100dvh - 20px)*4/3));aspect-ratio:4/3;max-height:calc(100dvh - 20px);border-radius:28px;overflow:hidden;box-shadow:0 20px 50px #0003;background:#dff7ff}.coverCard img{width:100%;height:100%;object-fit:contain}.startBtn{position:absolute;left:50%;bottom:4%;transform:translateX(-50%);font-size:clamp(22px,4vw,38px);font-weight:900;padding:.55em 1.4em;border:0;border-radius:999px;background:linear-gradient(#ffec67,#ff9f1c);color:#5a2d00;box-shadow:0 8px 0 #b86400,0 12px 25px #0004}.app{min-height:100dvh;background:linear-gradient(180deg,#d7f7ff,#f6fff2);padding:12px}.top{display:flex;gap:10px;align-items:center;justify-content:space-between;max-width:1100px;margin:0 auto 10px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{padding:12px 18px;border:3px solid #22577a;border-radius:18px;background:#fff;font-weight:900;color:#22577a}.tab.on{background:#22577a;color:white}.rankbox{font-weight:900;background:#fff;padding:10px 14px;border-radius:18px;border:3px solid #57cc99}.panel{max-width:1100px;margin:auto;background:#ffffffdd;border:4px solid #90e0ef;border-radius:28px;padding:18px;box-shadow:0 8px 25px #0001}h1,h2{margin:.2em 0 .5em}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.levelCard{position:relative;border-radius:28px;padding:20px;min-height:260px;background:linear-gradient(180deg,#fff,#f7fbff);border:4px solid #ddd;box-shadow:0 10px 22px #0002;text-align:center}.levelCard h2{font-size:30px}.badge{font-size:56px}.locked{filter:grayscale(1);opacity:.65}.challenge{margin-top:14px;padding:12px 20px;border:0;border-radius:999px;background:#06d6a0;color:#063;font-weight:900;box-shadow:0 5px 0 #04966f}.challenge:disabled{background:#ccc;color:#666;box-shadow:none}.gameHead{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.qbox{text-align:center;padding:22px;background:#fff;border-radius:28px;border:4px solid #ffd166;margin:15px 0}.qImage{width:min(330px,78vw);height:210px;object-fit:contain;filter:drop-shadow(0 8px 10px #0002)}.qname{font-size:clamp(34px,7vw,68px);font-weight:900}.romaji{font-size:clamp(22px,4vw,36px);color:#118ab2;font-weight:900;letter-spacing:2px}#answer{width:min(92vw,650px);font-size:32px;padding:14px 18px;border:4px solid #22577a;border-radius:20px;text-align:center}.result{font-size:28px;font-weight:900;min-height:40px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}.bioCard{background:linear-gradient(180deg,#fff,#f3fff8);border:3px solid #57cc99;border-radius:20px;padding:10px;text-align:center;min-height:235px;box-shadow:0 6px 14px #0001;position:relative;cursor:pointer}.bioCard.locked2{background:#eee;border-color:#ccc;color:#999}.cardImgBox{height:130px;display:grid;place-items:center;margin:4px 0}.cardImg{max-width:100%;max-height:126px;object-fit:contain;filter:drop-shadow(0 5px 6px #0002)}.skull{position:absolute;left:12px;top:10px;font-size:30px}.medal{position:absolute;right:12px;top:10px;font-size:30px}.filterBar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.filterBar button{border:2px solid #22577a;background:white;border-radius:999px;padding:8px 12px;font-weight:900}.filterBar .on{background:#22577a;color:white}.modal{position:fixed;inset:0;background:#0007;display:none;place-items:center;padding:20px;z-index:5}.modal.show{display:grid}.modalCard{background:#fff;border-radius:28px;padding:22px;max-width:560px;width:100%;border:5px solid #ffd166;text-align:center;max-height:90dvh;overflow:auto}.modalImg{width:min(340px,80vw);height:220px;object-fit:contain;filter:drop-shadow(0 8px 10px #0002)}.close{float:right;border:0;background:#ef476f;color:white;border-radius:999px;padding:8px 12px;font-weight:900}.cert{padding:25px;border:8px double #a47148;border-radius:20px;background:#fffdf2}.small{font-size:14px;color:#567}.danger{color:#d90429;font-weight:900}.progress{height:16px;background:#d7f7ff;border-radius:999px;overflow:hidden;border:2px solid #90e0ef}.progress>div{height:100%;width:0;background:#57cc99}@media(max-width:800px){.cards{grid-template-columns:1fr}.top{align-items:stretch;flex-direction:column}.tabs{display:grid;grid-template-columns:1fr 1fr}.tab{padding:10px 8px}}
</style>
</head>
<body>
<section id="cover" class="screen active"><div class="coverCard"><img src="assets/images/cover.png" onerror="this.style.display='none'" alt="生き物ハンター表紙"><button class="startBtn" onclick="showApp()">スタート</button></div></section>
<main id="app" class="screen app">
  <div class="top"><div class="tabs"><button class="tab on" id="tabHome" onclick="showTab('home')">タイピング練習</button><button class="tab" id="tabBook" onclick="showTab('book')">集めた生き物リスト</button><button class="tab" onclick="resetData()">記録リセット</button></div><div class="rankbox" id="rankBox">生き物博士への道</div></div>
  <section id="home" class="panel"><h1>生き物ハンタータイピング Ver0.6</h1><p>1ゲームは1分間。Enterで答えを確定しよう。まちがえたら入力欄が空になるよ。</p><div class="cards" id="levelCards"></div></section>
  <section id="game" class="panel" style="display:none"><div class="gameHead"><button class="tab" onclick="endGame()">← やめる</button><h2 id="gameTitle">初級研究員</h2><div class="rankbox">残り <span id="timeLeft">60</span> 秒　得点 <span id="score">0</span></div></div><div class="qbox"><img id="qImage" class="qImage" alt="問題画像"><div class="qname" id="qName"></div><div class="romaji" id="romaji"></div><input id="answer" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="latin" placeholder="ローマ字で入力して Enter"><div class="result" id="result"></div></div></section>
  <section id="book" class="panel" style="display:none"><h1>集めた生き物リスト</h1><div class="progress"><div id="progressBar"></div></div><p id="progressText" class="small"></p><div class="filterBar" id="filters"></div><div class="grid" id="bookGrid"></div></section>
</main>
<div class="modal" id="modal"><div class="modalCard"><button class="close" onclick="closeModal()">とじる</button><div id="modalContent"></div></div></div>
<script>
const ANIMALS = [{"id": "ari", "name": "アリ", "kana": "あり", "cat": "昆虫", "food": "小さな虫、甘いもの、植物の種など", "env": "校庭・草むら・土の中", "poison": false, "level": "初級"}, {"id": "batta", "name": "ショウリョウバッタ", "kana": "しょうりょうばった", "cat": "昆虫", "food": "草の葉", "env": "草むら・校庭", "poison": false, "level": "初級"}, {"id": "semi", "name": "セミ", "kana": "せみ", "cat": "昆虫", "food": "木のしる", "env": "木のある場所", "poison": false, "level": "初級"}, {"id": "hachi", "name": "ハチ", "kana": "はち", "cat": "昆虫", "food": "花のみつ、花粉、小さな虫など", "env": "花の近く・草むら", "poison": true, "level": "初級"}, {"id": "ga", "name": "ガ", "kana": "が", "cat": "昆虫", "food": "花のみつなど", "env": "草むら・明かりの近く", "poison": false, "level": "初級"}, {"id": "chou", "name": "モンシロチョウ", "kana": "もんしろちょう", "cat": "昆虫", "food": "花のみつ", "env": "花だん・畑・草むら", "poison": false, "level": "初級"}, {"id": "kamakiri", "name": "カマキリ", "kana": "かまきり", "cat": "昆虫", "food": "小さな虫", "env": "草むら・花だん", "poison": false, "level": "初級"}, {"id": "amenbo", "name": "アメンボ", "kana": "あめんぼ", "cat": "昆虫", "food": "水面に落ちた小さな虫", "env": "池・川の水面", "poison": false, "level": "初級"}, {"id": "medaka", "name": "メダカ", "kana": "めだか", "cat": "魚類", "food": "小さな水中の生き物、藻など", "env": "池・田んぼ・ゆるやかな川", "poison": false, "level": "初級"}, {"id": "koi", "name": "マゴイ", "kana": "まごい", "cat": "魚類", "food": "水草、小さな生き物、えさなど", "env": "池・川", "poison": false, "level": "初級"}, {"id": "namazu", "name": "ナマズ", "kana": "なまず", "cat": "魚類", "food": "小魚、水生昆虫など", "env": "川・池の底の方", "poison": false, "level": "初級"}, {"id": "dojou", "name": "ドジョウ", "kana": "どじょう", "cat": "魚類", "food": "泥の中の小さな生き物など", "env": "田んぼ・川・用水路", "poison": false, "level": "初級"}, {"id": "kaeru", "name": "カエル", "kana": "かえる", "cat": "両生類", "food": "小さな虫", "env": "田んぼ・池・草むら", "poison": false, "level": "初級"}, {"id": "imori", "name": "アカハライモリ", "kana": "あかはらいもり", "cat": "両生類", "food": "小さな水中の生き物", "env": "池・田んぼ・水辺", "poison": true, "level": "初級"}, {"id": "tokage", "name": "ニホントカゲ", "kana": "にほんとかげ", "cat": "爬虫類", "food": "小さな虫など", "env": "石の近く・草むら・日なた", "poison": false, "level": "初級"}, {"id": "yamori", "name": "ニホンヤモリ", "kana": "にほんやもり", "cat": "爬虫類", "food": "小さな虫", "env": "家の壁・すき間・夜の明かりの近く", "poison": false, "level": "初級"}, {"id": "kusagame", "name": "クサガメ", "kana": "くさがめ", "cat": "爬虫類", "food": "水草、小魚、小さな生き物など", "env": "池・川・水辺", "poison": false, "level": "初級"}, {"id": "kumo", "name": "クモ", "kana": "くも", "cat": "その他", "food": "小さな虫", "env": "草むら・木・家のまわり", "poison": false, "level": "初級"}, {"id": "mimizu", "name": "ミミズ", "kana": "みみず", "cat": "その他", "food": "落ち葉や土の中の有機物", "env": "土の中・しめった場所", "poison": false, "level": "初級"}, {"id": "kani", "name": "モクズガニ", "kana": "もくずがに", "cat": "その他", "food": "小さな生き物、落ち葉など", "env": "水辺・川・海辺", "poison": false, "level": "初級"}, {"id": "ebi", "name": "ヌマエビ", "kana": "ぬまえび", "cat": "その他", "food": "藻、小さな有機物など", "env": "池・川・水草の近く", "poison": false, "level": "初級"}, {"id": "namekuji", "name": "ナメクジ", "kana": "なめくじ", "cat": "その他", "food": "やわらかい植物、落ち葉など", "env": "しめった場所・草むら", "poison": false, "level": "初級"}, {"id": "dangomushi", "name": "ダンゴムシ", "kana": "だんごむし", "cat": "その他", "food": "落ち葉、くさった植物など", "env": "石の下・落ち葉の下・しめった場所", "poison": false, "level": "初級"}, {"id": "kawanina", "name": "カワニナ", "kana": "かわにな", "cat": "その他", "food": "藻、石についた小さなもの", "env": "きれいな川・石のある水辺", "poison": false, "level": "初級"}, {"id": "sawagani", "name": "サワガニ", "kana": "さわがに", "cat": "その他", "food": "小さな生き物、落ち葉など", "env": "きれいな沢・水辺", "poison": false, "level": "初級"}];
const IMG = id => `assets/images/${id}.png`;
const SAVE_KEY='ikimonoHunterV06';
const LEVELS=[
 {id:'easy',name:'初級研究員',badge:'🥉',showRoma:true,need:null,desc:'短い生き物中心。まずはここから！'},
 {id:'middle',name:'中級研究員',badge:'🥈',showRoma:true,need:'easy',desc:'25種すべて。ローマ字表示あり。'},
 {id:'hard',name:'上級研究員',badge:'🥇',showRoma:false,need:'middle',desc:'25種すべて。ローマ字表示なし。'}
];
let state=loadState(), currentLevel=null, pool=[], current=null, timer=null, time=60, score=0, filter='すべて';
function loadState(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||{found:{},best:{},cleared:{}}}catch(e){return{found:{},best:{},cleared:{}}}}
function save(){localStorage.setItem(SAVE_KEY,JSON.stringify(state))}
function resetData(){if(confirm('記録をリセットしますか？')){localStorage.removeItem(SAVE_KEY);state=loadState();renderAll();showTab('home')}}
function showApp(){document.getElementById('cover').classList.remove('active');document.getElementById('app').classList.add('active');renderAll();}
function showTab(tab){document.getElementById('home').style.display=tab==='home'?'block':'none';document.getElementById('book').style.display=tab==='book'?'block':'none';document.getElementById('game').style.display='none';document.getElementById('tabHome').classList.toggle('on',tab==='home');document.getElementById('tabBook').classList.toggle('on',tab==='book');if(tab==='book')renderBook();}
function renderAll(){renderLevels();renderBook();updateRank();}
function updateRank(){const n=Object.keys(state.found).length;let title='見習いハンター';if(n>=25)title='生き物博士';else if(n>=16)title='上級ハンター';else if(n>=8)title='中級ハンター';document.getElementById('rankBox').textContent=`${title}　発見 ${n}/25`;}
function renderLevels(){const box=document.getElementById('levelCards');box.innerHTML='';LEVELS.forEach(l=>{const locked=l.need&&!state.cleared[l.need];const card=document.createElement('div');card.className='levelCard'+(locked?' locked':'');card.innerHTML=`<div class="badge">${l.badge}</div><h2>${l.name}</h2><p>${l.desc}</p><p class="small">ベスト：${state.best[l.id]||0}点</p><button class="challenge" ${locked?'disabled':''}>挑戦する</button>`;card.querySelector('button').onclick=()=>startGame(l);box.appendChild(card);});}
function animalsForLevel(level){if(level.id==='easy')return ANIMALS.filter(a=>['ari','kumo','kani','ebi','medaka','kaeru','dojou','ga','semi','hachi','namekuji','mimizu','dangomushi','kawanina','amenbo'].includes(a.id));return [...ANIMALS];}
function startGame(level){currentLevel=level;pool=shuffle(animalsForLevel(level));score=0;time=60;document.getElementById('score').textContent=score;document.getElementById('timeLeft').textContent=time;document.getElementById('gameTitle').textContent=level.name;document.getElementById('home').style.display='none';document.getElementById('book').style.display='none';document.getElementById('game').style.display='block';document.getElementById('tabHome').classList.remove('on');document.getElementById('tabBook').classList.remove('on');nextQuestion();clearInterval(timer);timer=setInterval(()=>{time--;document.getElementById('timeLeft').textContent=time;if(time<=0)endGame(true)},1000);document.getElementById('answer').focus();}
function nextQuestion(){if(pool.length===0)pool=shuffle(animalsForLevel(currentLevel));current=pool.pop();document.getElementById('qImage').src=IMG(current.id);document.getElementById('qName').textContent=current.name;document.getElementById('romaji').textContent=currentLevel.showRoma?romajiOptions(current.kana)[0]:'';document.getElementById('answer').value='';document.getElementById('result').textContent='';}
document.getElementById('answer').addEventListener('keydown',e=>{if(e.key==='Enter'){const v=e.target.value.trim().toLowerCase();const ok=romajiOptions(current.kana).includes(v);if(ok){score++;state.found[current.id]=true;document.getElementById('score').textContent=score;document.getElementById('result').textContent='正解！';nextQuestion();}else{document.getElementById('result').textContent='もう一回！';e.target.value='';}}});
function endGame(finished=false){clearInterval(timer);if(currentLevel){state.best[currentLevel.id]=Math.max(state.best[currentLevel.id]||0,score);if(finished&&score>=10)state.cleared[currentLevel.id]=true;save();alert(`${currentLevel.name} 終了！ 得点：${score}点${score>=10?'\nクリア！次のレベルが解放されます。':''}`);}currentLevel=null;renderAll();showTab('home');}
function renderBook(){const cats=['すべて','昆虫','魚類','両生類','爬虫類','その他'];const f=document.getElementById('filters');f.innerHTML='';cats.forEach(c=>{const b=document.createElement('button');b.textContent=c;b.className=filter===c?'on':'';b.onclick=()=>{filter=c;renderBook()};f.appendChild(b);});const data=filter==='すべて'?ANIMALS:ANIMALS.filter(a=>a.cat===filter);const grid=document.getElementById('bookGrid');grid.innerHTML='';data.forEach(a=>{const found=!!state.found[a.id];const card=document.createElement('div');card.className='bioCard'+(found?'':' locked2');card.innerHTML=`${a.poison?'<div class="skull">☠️</div>':''}<div class="medal">${found?'✅':'🔒'}</div><div class="cardImgBox"><img class="cardImg" src="${found?IMG(a.id):IMG('unknown')}" alt="${found?a.name:'未発見'}"></div><h2>${found?a.name:'？？？'}</h2><p class="small">${found?a.cat:'発見すると画像が開放されるよ'}</p>`;card.onclick=()=>found&&openModal(a);grid.appendChild(card);});const n=Object.keys(state.found).length;document.getElementById('progressText').textContent=`発見 ${n}/25`;document.getElementById('progressBar').style.width=`${n/25*100}%`;}
function openModal(a){document.getElementById('modalContent').innerHTML=`<img class="modalImg" src="${IMG(a.id)}" alt="${a.name}"><h1>${a.name}</h1><p><b>分類：</b>${a.cat}</p><p><b>エサ：</b>${a.food}</p><p><b>すんでいる環境：</b>${a.env}</p>${a.poison?'<p class="danger">☠️ 毒や針などに注意</p>':''}`;document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function shuffle(arr){return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1])}
const kanaMap={'あ':'a','い':'i','う':'u','え':'e','お':'o','か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko','さ':'sa','し':'shi','す':'su','せ':'se','そ':'so','た':'ta','ち':'chi','つ':'tsu','て':'te','と':'to','な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no','は':'ha','ひ':'hi','ふ':'fu','へ':'he','ほ':'ho','ま':'ma','み':'mi','む':'mu','め':'me','も':'mo','や':'ya','ゆ':'yu','よ':'yo','ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro','わ':'wa','を':'wo','ん':'n','が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go','ざ':'za','じ':'ji','ず':'zu','ぜ':'ze','ぞ':'zo','だ':'da','ぢ':'ji','づ':'zu','で':'de','ど':'do','ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo','ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po'};
const combo={'きゃ':'kya','きゅ':'kyu','きょ':'kyo','しゃ':'sha','しゅ':'shu','しょ':'sho','ちゃ':'cha','ちゅ':'chu','ちょ':'cho','にゃ':'nya','にゅ':'nyu','にょ':'nyo','ひゃ':'hya','ひゅ':'hyu','ひょ':'hyo','みゃ':'mya','みゅ':'myu','みょ':'myo','りゃ':'rya','りゅ':'ryu','りょ':'ryo','ぎゃ':'gya','ぎゅ':'gyu','ぎょ':'gyo','じゃ':'ja','じゅ':'ju','じょ':'jo','びゃ':'bya','びゅ':'byu','びょ':'byo','ぴゃ':'pya','ぴゅ':'pyu','ぴょ':'pyo'};
function toRomaji(str){let out='';for(let i=0;i<str.length;i++){let ch=str[i];if(ch==='っ'){let next=combo[str.slice(i+1,i+3)]||kanaMap[str[i+1]]||'';out+=next[0]||'';continue;}let two=str.slice(i,i+2);if(combo[two]){out+=combo[two];i++;continue;}if(ch==='ー'){let m=out.match(/[aeiou](?!.*[aeiou])/);out+=m?m[0]:'';continue;}out+=kanaMap[ch]||ch.toLowerCase();}return out;}
function romajiOptions(name){const base=toRomaji(name).toLowerCase();const set=new Set([base]);const repl=(a,b)=>{Array.from(set).forEach(v=>{if(v.includes(a))set.add(v.split(a).join(b))})};for(let i=0;i<3;i++){[['shi','si'],['chi','ti'],['tsu','tu'],['fu','hu'],['ji','zi'],['ja','zya'],['ju','zyu'],['jo','zyo'],['sha','sya'],['shu','syu'],['sho','syo'],['cha','tya'],['chu','tyu'],['cho','tyo'],['cha','cya'],['chu','cyu'],['cho','cyo']].forEach(([a,b])=>{repl(a,b);repl(b,a);});}
Array.from(set).forEach(v=>{const chars=[...v];for(let i=0;i<chars.length;i++){if(chars[i]==='n'&&chars[i+1]!=='n'){let arr=[...chars];arr.splice(i+1,0,'n');set.add(arr.join(''));}}});Array.from(set).forEach(v=>{if(v.includes('ou')){set.add(v.replaceAll('ou','o'));set.add(v.replaceAll('ou','oo'));}});return Array.from(set);}
renderAll();
</script>
</body>
</html>
