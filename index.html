}

function showTab(tab){document.getElementById('home').style.display=tab==='home'?'block':'none';document.getElementById('book').style.display=tab==='book'?'block':'none';document.getElementById('game').style.display='none';document.getElementById('tabHome').classList.toggle('on',tab==='home');document.getElementById('tabBook').classList.toggle('on',tab==='book');if(tab==='book')renderBook();}
function renderAll(){migrateFoundData();renderLevels();renderBook();updateRank();}
function migrateFoundData(){if(!state.found)state.found={};Object.keys(state.found).forEach(id=>{if(state.found[id]===true)state.found[id]={easy:true};});}
function foundInfo(id){const v=state.found&&state.found[id];if(v===true){state.found[id]={easy:true};return state.found[id];}return v&&typeof v==='object'?v:{};}
function isFound(id){return Object.keys(foundInfo(id)).length>0;}
function foundCount(){return Object.keys(state.found||{}).filter(id=>isFound(id)).length;}
function rankMarks(id){const f=foundInfo(id);return ['easy','middle','hard','special','secret'].filter(k=>f[k]).map(k=>LEVEL_BADGES[k]).join(' ')||'🔒';}
function rankText(id){const f=foundInfo(id);const names=['easy','middle','hard','special','secret'].filter(k=>f[k]).map(k=>LEVEL_BADGES[k]+' '+LEVEL_NAMES[k]);return names.length?names.join(' ／ '):'未発見';}
function updateRank(){
  const n=foundCount();
  const total=ANIMALS.length || 55;
  let title='見習いハンター';
  if(n>=total) title='伝説の生き物博士';
  else if(n>=25) title='生き物博士';
  else if(n>=16) title='上級ハンター';
  else if(n>=8) title='中級ハンター';
  document.getElementById('rankBox').textContent=`${title}　発見 ${n}/${total}`;
}
function renderLevels(){
  const box=document.getElementById('levelCards');
  box.innerHTML='';
  LEVELS.filter(isLevelVisible).forEach(l=>{
    const locked=isLevelLocked(l);
    const c=remainingForLevel(l);
    const card=document.createElement('div');
    card.className='levelCard'+(locked?' locked':'');
    card.innerHTML=`<div class="badge">${l.badge}</div><h2>${l.name}</h2><p>${l.desc}</p><p class="small">この難易度であと <b>${c.remaining}</b> / ${c.total} 匹ゲットできる</p><p class="small">ベスト：${state.best[l.id]||0}点</p>${locked?`<p class="small danger">${levelUnlockText(l)}</p>`:''}<button class="challenge" ${locked?'disabled':''}>挑戦する</button>`;
    card.querySelector('button').onclick=()=>startGame(l);
    box.appendChild(card);
  });
}
function startGame(level){document.getElementById('answer').disabled=false;currentLevel=level;if(level.id==='secret'){secretMiss=0;if(secretAttempt<0)secretAttempt=0;}pool=shuffle(animalsForLevel(level));score=0;time=60;document.getElementById('score').textContent=score;document.getElementById('timeLeft').textContent=time;document.getElementById('gameTitle').textContent=level.name;document.getElementById('home').style.display='none';document.getElementById('book').style.display='none';document.getElementById('game').style.display='block';document.getElementById('tabHome').classList.remove('on');document.getElementById('tabBook').classList.remove('on');nextQuestion();clearInterval(timer);if(level.id!=='secret'){timer=setInterval(()=>{time--;document.getElementById('timeLeft').textContent=time;if(time<=0)endGame(true)},1000);}else{document.getElementById('timeLeft').textContent='∞';document.getElementById('score').textContent=score;}setTimeout(()=>document.getElementById('answer').focus(),50);}
function nextQuestion(){if(currentLevel&&currentLevel.id==='secret'){renderSecretQuestion();return;}if(pool.length===0)pool=shuffle(animalsForLevel(currentLevel));current=pool.pop();document.getElementById('qImage').src=IMG(current.id);document.getElementById('qName').textContent=current.name;document.getElementById('romaji').textContent=currentLevel.showRoma?romajiOptions(current.kana)[0]:'';document.getElementById('answer').value='';document.getElementById('result').textContent='';}
document.getElementById('answer').addEventListener('keydown',e=>{if(e.key==='Enter'){const v=e.target.value.trim().toLowerCase();if(currentLevel&&currentLevel.id==='secret'){if(v===SECRET_ANSWER){secretComplete();}else{secretMiss++; if(secretMiss>=3){secretGameOver();}else{document.getElementById('result').innerHTML=(document.getElementById('result').innerHTML||'')+`<div class="danger">もう一回！ 残り${3-secretMiss}回</div>`; e.target.value='';}}return;}const ok=romajiOptions(current.kana).includes(v);if(ok){score++;state.found[current.id]=foundInfo(current.id);state.found[current.id][currentLevel.id]=true;document.getElementById('score').textContent=score;document.getElementById('result').textContent='正解！';save();nextQuestion();}else{document.getElementById('result').textContent='もう一回！';e.target.value='';}}});
function endGame(finished=false){clearInterval(timer);if(currentLevel){state.best[currentLevel.id]=Math.max(state.best[currentLevel.id]||0,score);const clear=finished&&score>=10;if(clear)state.cleared[currentLevel.id]=true;save();let msg=`${currentLevel.name} 終了！ 得点：${score}点`;if(clear){if(currentLevel.id==='easy')msg+='\nクリア！中級研究員が解放されます。';else if(currentLevel.id==='middle')msg+='\nクリア！上級研究員が解放されます。';else if(currentLevel.id==='hard')msg+='\nクリア！特級研究員が解放されます。';else if(currentLevel.id==='special')msg+='\nクリア！SECRET解放まであと少し！';else msg+='\nクリア！';}alert(msg);}currentLevel=null;renderAll();showTab('home');}
function renderBook(){const cats=['すべて','通常図鑑','特級図鑑','SECRET',...Array.from(new Set(ANIMALS.map(a=>a.cat)))];const f=document.getElementById('filters');f.innerHTML='';cats.forEach(c=>{const b=document.createElement('button');b.textContent=c;b.className=filter===c?'on':'';b.onclick=()=>{filter=c;renderBook()};f.appendChild(b);});let data=ANIMALS;if(filter==='通常図鑑')data=ANIMALS.filter(a=>a.level==='初級');else if(filter==='特級図鑑')data=ANIMALS.filter(a=>a.level==='特級');else if(filter==='SECRET')data=ANIMALS.filter(a=>a.level==='SECRET');else if(filter!=='すべて')data=ANIMALS.filter(a=>a.cat===filter);const grid=document.getElementById('bookGrid');grid.innerHTML='';data.forEach(a=>{const found=isFound(a.id);const card=document.createElement('div');card.className='bioCard'+(found?'':' locked2')+(found&&a.level==='特級'?' specialCard':'')+(found&&a.level==='SECRET'?' secretCard':'')+(found&&a.level==='特級'?' specialFound':'')+(found&&a.level==='SECRET'?' secretFound':'');card.innerHTML=`${a.poison?'<div class="skull">☠️</div>':''}<div class="medal">${found?rankMarks(a.id):'🔒'}</div><div class="cardImgBox"><img class="cardImg" src="${found?IMG(a.id):IMG('unknown')}" alt="${found?a.name:'未発見'}"></div><h2>${found?a.name:'？？？'}</h2><p class="small">${found?a.cat:'発見すると画像が開放されるよ'}</p><p class="small">${found?'取得：'+rankText(a.id):''}</p>`;card.onclick=()=>found&&openModal(a);grid.appendChild(card);});const n=foundCount();document.getElementById('progressText').textContent=`発見 ${n}/${ANIMALS.length}`;document.getElementById('progressBar').style.width=`${ANIMALS.length?n/ANIMALS.length*100:0}%`;}
function openModal(a){
  const modalCard=document.querySelector('#modal .modalCard');
  modalCard.classList.remove('specialModal','secretModal');
  if(a.level==='特級') modalCard.classList.add('specialModal');
  if(a.level==='SECRET') modalCard.classList.add('secretModal');
  document.getElementById('modalContent').innerHTML=`<img class="modalImg" src="${IMG(a.id)}" alt="${a.name}"><h1>${a.name}</h1><p style="font-size:28px;font-weight:900">取得ランク：${rankText(a.id)}</p><p><b>分類：</b>${a.cat}</p><p><b>エサ：</b>${a.food}</p><p><b>すんでいる環境：</b>${a.env}</p>${a.poison?'<p class="danger">☠️ 毒や針などに注意</p>':''}`;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');document.querySelector('#modal .modalCard').classList.remove('specialModal','secretModal')}
function shuffle(arr){return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1])}
const kanaMap={'あ':'a','い':'i','う':'u','え':'e','お':'o','か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko','さ':'sa','し':'shi','す':'su','せ':'se','そ':'so','た':'ta','ち':'chi','つ':'tsu','て':'te','と':'to','な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no','は':'ha','ひ':'hi','ふ':'fu','へ':'he','ほ':'ho','ま':'ma','み':'mi','む':'mu','め':'me','も':'mo','や':'ya','ゆ':'yu','よ':'yo','ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro','わ':'wa','を':'wo','ん':'n','が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go','ざ':'za','じ':'ji','ず':'zu','ぜ':'ze','ぞ':'zo','だ':'da','ぢ':'ji','づ':'zu','で':'de','ど':'do','ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo','ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po'};
const combo={'きゃ':'kya','きゅ':'kyu','きょ':'kyo','しゃ':'sha','しゅ':'shu','しょ':'sho','ちゃ':'cha','ちゅ':'chu','ちょ':'cho','にゃ':'nya','にゅ':'nyu','にょ':'nyo','ひゃ':'hya','ひゅ':'hyu','ひょ':'hyo','みゃ':'mya','みゅ':'myu','みょ':'myo','りゃ':'rya','りゅ':'ryu','りょ':'ryo','ぎゃ':'gya','ぎゅ':'gyu','ぎょ':'gyo','じゃ':'ja','じゅ':'ju','じょ':'jo','びゃ':'bya','びゅ':'byu','びょ':'byo','ぴゃ':'pya','ぴゅ':'pyu','ぴょ':'pyo'};
function toRomaji(str){let out='';for(let i=0;i<str.length;i++){let ch=str[i];if(ch==='っ'){let next=combo[str.slice(i+1,i+3)]||kanaMap[str[i+1]]||'';out+=next[0]||'';continue;}let two=str.slice(i,i+2);if(combo[two]){out+=combo[two];i++;continue;}if(ch==='ー'){let m=out.match(/[aeiou](?!.*[aeiou])/);out+=m?m[0]:'';continue;}out+=kanaMap[ch]||ch.toLowerCase();}return out;}
function romajiOptions(name){const base=toRomaji(name).toLowerCase();const set=new Set([base]);const repl=(a,b)=>{Array.from(set).forEach(v=>{if(v.includes(a))set.add(v.split(a).join(b))})};for(let i=0;i<3;i++){[['shi','si'],['chi','ti'],['tsu','tu'],['fu','hu'],['ji','zi'],['ja','zya'],['ju','zyu'],['jo','zyo'],['sha','sya'],['shu','syu'],['sho','syo'],['cha','tya'],['chu','tyu'],['cho','tyo'],['cha','cya'],['chu','cyu'],['cho','cyo']].forEach(([a,b])=>{repl(a,b);repl(b,a);});}Array.from(set).forEach(v=>{const chars=[...v];for(let i=0;i<chars.length;i++){if(chars[i]==='n'&&chars[i+1]!=='n'){let arr=[...chars];arr.splice(i+1,0,'n');set.add(arr.join(''));}}});Array.from(set).forEach(v=>{if(v.includes('ou')){set.add(v.replaceAll('ou','o'));set.add(v.replaceAll('ou','oo'));}});return Array.from(set);}

const SECRET_ANSWER='gokiburi';
const SECRET_HINTS=[
  '・とても身近な生き物だよ。',
  '・茶色だよ。',
  '・あまりいいイメージはないけど、<br>　れっきとした昆虫の仲間だよ。'
];
let secretMiss=0;
let secretAttempt=0;
function allNonSecretCollected(){
  const targets=ANIMALS.filter(a=>a.level!=='SECRET');
  return targets.every(a=>isFound(a.id));
}



function secretHintCount(){
  if(secretAttempt<=0)return 0;
  if(secretAttempt===1)return 1;
  if(secretAttempt===2)return 2;
  return 3;
}
function secretRomaCount(){
  if(secretAttempt<4)return 0;
  return Math.min(SECRET_ANSWER.length, secretAttempt-3);
}
function renderSecretQuestion(){
  current=ANIMALS.find(a=>a.level==='SECRET') || current;
  document.getElementById('qImage').src=IMG('unknown');
  document.getElementById('qName').textContent='？？？？';
  const roma=SECRET_ANSWER.slice(0,secretRomaCount());
  document.getElementById('romaji').innerHTML=roma?`<div class="secretRomaHint">${roma}</div>`:'';
  const hints=SECRET_HINTS.slice(0,secretHintCount()).join('<br>');
  document.getElementById('result').innerHTML=hints?`<div class="secretHintBox">${hints}</div>`:'';
  document.getElementById('answer').value='';
}
function secretGameOver(){
  clearInterval(timer);
  secretAttempt++;
  secretMiss=0;
  document.getElementById('answer').disabled=true;
  document.getElementById('result').innerHTML='<div class="secretGameOver">見つけられなかったようだね。<br>もう一回チャレンジしてみよう！</div>';
  save();
  setTimeout(()=>{
    document.getElementById('answer').disabled=false;
    currentLevel=null;
    renderAll();
    showTab('home');
  },2600);
}
function secretComplete(){
  const s=ANIMALS.find(a=>a.level==='SECRET');
  if(s){state.found[s.id]={secret:true};state.cleared.secret=true;}
  save();
  document.getElementById('qImage').src=IMG(s?s.id:'gokiburi');
  document.getElementById('qName').textContent='ゴキブリ';
  document.getElementById('romaji').innerHTML='';
  document.getElementById('result').innerHTML='<div class="secretComplete">🎉 SECRET COMPLETE!!<br>ゴキブリ 発見！<br>全55種類コンプリート！！</div>';
  setTimeout(()=>{currentLevel=null;renderAll();showTab('book');},3000);
}

loadAnimals();
document.addEventListener('DOMContentLoaded',()=>{
  const b=document.querySelector('.startBtn');
  if(b) b.addEventListener('click', showApp);
});
</script>
